name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Release checks
        run: make release-check

      - name: Package HACS artifact
        run: |
          mkdir -p dist
          zip -r dist/ha-bereginya-aura.zip \
            custom_components \
            hacs.json \
            README.md \
            LICENSE \
            assets

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ha-bereginya-aura
          path: dist/ha-bereginya-aura.zip
